apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Base configuration for Coder
#
# Prerequisites - PostgreSQL (installed via Helm):
#   helm repo add bitnami https://charts.bitnami.com/bitnami
#   helm repo update
#   helm install postgresql bitnami/postgresql \
#       --namespace coder \
#       --create-namespace \
#       -f postgresql-values.yaml
#
# Installation - Coder (installed via Helm):
#   helm repo add coder-v2 https://helm.coder.com/v2
#   helm repo update
#   helm install coder coder-v2/coder \
#       --namespace coder \
#       --values values.yaml \
#       --version 2.30.0

namespace: coder

resources:
  - namespace.yaml
  - secret-db-url.yaml

configMapGenerator:
  - name: coder-helm-values
    files:
      - values.yaml
  - name: coder-postgresql-helm-values
    files:
      - postgresql-values.yaml

labels:
  - pairs:
      app.kubernetes.io/name: coder
      app.kubernetes.io/part-of: ml-platform
    includeSelectors: false
